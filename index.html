<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aakash • Portfolio</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />

    <!-- Set dark or light before paint -->
    <script>
      (() => {
        const stored = localStorage.getItem("theme");
        const mql = window.matchMedia("(prefers-color-scheme: dark)");
        const system = mql.matches ? "dark" : "light";
        const theme = stored || system;

        const html = document.documentElement;
        html.classList.remove("dark");                 // remove any stale class
        html.setAttribute("data-theme", theme);
      })();
    </script>
    
  </head>

  <body class="font-sans bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
